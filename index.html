<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecionando...</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .btn { padding: 20px 40px; background: #fe2c55; color: #fff; text-decoration: none; border-radius: 50px; font-weight: bold; display: block; }
    </style>
</head>
<body>
    <div>
        <p>Acesse o conteúdo no navegador externo:</p>
        <a href="#" id="fuga" class="btn">CLIQUE PARA ABRIR</a>
    </div>

    <script>
        const linkFinal = "https://bio.site/GabrielADM";

        document.getElementById('fuga').onclick = function(e) {
            e.preventDefault();
            
            // Técnica de "Bomba de Navegação": tenta abrir um link que o TikTok não consegue ler
            // 1. Tenta o Intent direto com fallback
            const intentUrl = "intent://" + linkFinal.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
            
            // 2. Tenta abrir via download simulado (isso costuma ejetar do TikTok)
            const a = document.createElement('a');
            a.href = linkFinal;
            a.download = 'site.html';
            
            // Disparo duplo
            window.location.href = intentUrl;
            
            setTimeout(() => {
                // Se ainda estiver no TikTok, tenta abrir uma nova janela via script
                window.open(linkFinal, '_system');
                window.open(linkFinal, '_blank');
            }, 500);
        };

        // Auto-click tentativa
        setTimeout(() => {
            document.getElementById('fuga').click();
        }, 1000);
    </script>
</body>
</html>
