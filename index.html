<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando...</title>
    <style>
        body { 
            background: #121212; 
            color: #ffffff; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center;
        }
        .loader { 
            border: 4px solid #333; 
            border-top: 4px solid #00f2ea; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .btn {
            display: none;
            margin-top: 20px;
            padding: 15px 30px;
            background: #fe2c55;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(254, 44, 85, 0.4);
        }
        .instr {
            display: none;
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div id="loading-area">
        <div class="loader"></div>
        <p>Abrindo no navegador seguro...</p>
    </div>

    <a href="https://bio.site/GabrielADM" id="manual-btn" class="btn">ABRIR NO NAVEGADOR</a>
    
    <p id="instruction" class="instr">
        Se o botão não funcionar, clique nos <b>três pontinhos</b> <br> no topo e selecione <b>"Abrir no navegador"</b>.
    </p>

    <script>
        const targetRaw = "bio.site/GabrielADM";
        const targetFull = "https://" + targetRaw;

        function tryRedirect() {
            // Técnica 1: Intent para Android (Força o Chrome)
            if (/Android/i.test(navigator.userAgent)) {
                window.location.href = `intent://${targetRaw}#Intent;scheme=https;package=com.android.chrome;end`;
            } 
            // Técnica 2: Blob Trick (Tenta forçar saída via 'download' invisível)
            else {
                window.location.replace(targetFull);
            }
        }

        // Tenta o redirect automático após 1.5 segundos
        setTimeout(() => {
            tryRedirect();
            
            // Se o usuário ainda estiver aqui após 3 segundos, o TikTok bloqueou o auto-redirect
            setTimeout(() => {
                document.getElementById('loading-area').style.display = 'none';
                document.getElementById('manual-btn').style.display = 'inline-block';
                document.getElementById('instruction').style.display = 'block';
            }, 2500);
        }, 1500);

        // Ação do botão manual
        document.getElementById('manual-btn').onclick = function(e) {
            // Se for Android, tenta o intent de novo no clique (tem mais prioridade)
            if (/Android/i.test(navigator.userAgent)) {
                window.location.href = `intent://${targetRaw}#Intent;scheme=https;package=com.android.chrome;end`;
                return false;
            }
        };
    </script>
</body>
</html>
